version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: spriteforge-db
    environment:
      POSTGRES_USER: spriteforge
      POSTGRES_PASSWORD: spriteforge
      POSTGRES_DB: spriteforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spriteforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spriteforge-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://spriteforge:spriteforge@postgres:5432/spriteforge
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_PATH: /data/storage
      LOG_LEVEL: INFO
    volumes:
      - ./:/app
      - storage_data:/data/storage
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  storage_data:
